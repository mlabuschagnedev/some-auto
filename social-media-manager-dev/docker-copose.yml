services:
  postgres:
    image: postgres:16
    container_name: some_auto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: someauto
      POSTGRES_PASSWORD: someauto_password
      POSTGRES_DB: some_auto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: